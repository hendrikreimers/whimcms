<section class="card">
  <header class="card-header">
    <h1>New page</h1>
    <a class="btn btn-ghost btn-sm" href="{{ BASE }}/pages">← All pages</a>
  </header>

  {% if: ERROR %}<div class="alert" role="alert">{{ ERROR }}</div>{% endif %}

  <form method="POST" action="{{ BASE }}/pages/new">
    <input type="hidden" name="_csrf" value="{{ CSRF }}">

    <label class="field">
      <span class="field-label">Language</span>
      <select class="field-input" name="lang" required>
        <option value="">— pick —</option>
        {% for: LANGS, as: 'l' %}
        <option value="{{ l }}">{{ l }}</option>
        {% endfor %}
      </select>
      <span class="field-help">Two-letter ISO code. Configure additional langs in Phase 5 (or core <code>config/i18n.php</code>).</span>
    </label>

    <label class="field">
      <span class="field-label">Slug</span>
      <input class="field-input" type="text" name="slug" value="{{ SLUG }}" required pattern="[A-Za-z][A-Za-z0-9_-]{0,40}" maxlength="41">
      <span class="field-help">Letters, digits, underscores, hyphens. Must start with a letter.</span>
    </label>

    <label class="field">
      <span class="field-label">Layout</span>
      <select class="field-input" name="layout">
        {% for: LAYOUTS, as: 'l' %}
        <option value="{{ l.value }}"{% if: l.selected %} selected{% endif %}>{{ l.label }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="field">
      <span class="field-label">Title (optional, sets meta.title)</span>
      <input class="field-input" type="text" name="title" value="{{ TITLE }}" maxlength="200">
    </label>

    <div class="actions">
      <button class="btn btn-primary" type="submit">Create</button>
      <a class="btn btn-ghost" href="{{ BASE }}/pages">Cancel</a>
    </div>
  </form>
</section>
