<section class="card card-wide">
  <header class="card-header">
    <h1>Pages</h1>
    <div class="header-actions">
      <a class="btn btn-ghost btn-sm" href="{{ BASE }}/pages/recycler">Recycler</a>
      <a class="btn btn-primary btn-sm" href="{{ BASE }}/pages/new">+ New page</a>
    </div>
  </header>

  {% if: NOTICE %}<div class="notice" role="status">{{ NOTICE }}</div>{% endif %}

  {% if: EMPTY %}
  <p class="muted">No pages yet. <a href="{{ BASE }}/pages/new">Create your first page →</a></p>
  {% endif %}

  {% for: GROUPS, as: 'g' %}
  <section class="lang-group">
    <h2 class="lang-group-head"><span class="lang-tag">{{ g.lang }}</span></h2>
    <table class="page-list">
      <thead>
        <tr><th>Slug</th><th>Modified</th><th></th></tr>
      </thead>
      <tbody>
        {% for: g.pages, as: 'p' %}
        <tr>
          <td><code>{{ p.slug }}</code></td>
          <td class="muted">{{ p.mtime_human }}</td>
          <td><a class="btn btn-ghost btn-sm" href="{{ BASE }}/pages/edit?lang={{ g.lang }}&amp;slug={{ p.slug }}">Edit</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </section>
  {% endfor %}
</section>
