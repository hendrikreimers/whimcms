<label class="field">
  <span class="field-label">{{ LABEL }}</span>
  <span class="field-image-wrap">
    <input class="field-input" type="text" name="{{ NAME }}" value="{{ VALUE }}" placeholder="/assets/images/..." list="asset-paths">
    <button type="button" class="btn btn-ghost btn-sm" data-asset-picker>Browse…</button>
  </span>
  <span class="field-help">Path under <code>/assets</code>. Type to autocomplete, or click <em>Browse</em> for a thumbnail picker.</span>
</label>
