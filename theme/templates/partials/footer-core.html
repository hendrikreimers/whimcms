<footer class="footer footer-core">
  <div class="container footer-inner">
    <div class="footer-brand">
      <span class="footer-mark" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none"><rect x="6" y="6" width="36" height="36" rx="6" fill="currentColor"/><rect x="22" y="22" width="36" height="36" rx="6" fill="currentColor" opacity="0.45"/></svg>
      </span>
      <span class="footer-wordmark">WhimCMS</span>
      <p class="footer-tagline">{{ CURRENT_LANG.footer.tagline }}</p>
    </div>

    <nav class="footer-nav" aria-label="{{ CURRENT_LANG.footer.navAria }}">
      {% for: CURRENT_LANG.navigation.footer, as: 'item' %}
        {% if: item.anchor %}<a href="{{ URLS.home }}#{{ item.anchor }}" class="footer-link">{{ item.label }}</a>{% endif %}
        {% if: item.slug %}<a href="{% lookup: URLS, key: item.slug %}" class="footer-link">{{ item.label }}</a>{% endif %}
        {% if: item.href %}<a href="{% safe_href: item.href %}" class="footer-link">{{ item.label }}</a>{% endif %}
      {% endfor %}
    </nav>

    <p class="footer-copy">{{ CURRENT_LANG.footer.copy }}</p>
  </div>
</footer>
