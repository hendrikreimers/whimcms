<!DOCTYPE html>
<html lang="{{ LANG }}">
<head>
  <meta charset="UTF-8" />
  <title>{{ CURRENT_LANG.contactMail.recipient.subject }}</title>
</head>
<body style="margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.55;color:#1a1a1a;background:#f7f7f7">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;margin:0 auto;background:#ffffff;border:1px solid #e5e5e5;border-collapse:collapse">
    <tr>
      <td style="padding:32px 32px 16px 32px">
        <p style="margin:0 0 16px 0;font-size:15px">{{ CURRENT_LANG.contactMail.recipient.intro }}</p>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%;border-collapse:collapse">
          <tr>
            <td style="padding:8px 0;border-bottom:1px solid #eee;font-size:13px;color:#666;width:120px">{{ CURRENT_LANG.home.contact.form.name }}</td>
            <td style="padding:8px 0;border-bottom:1px solid #eee;font-size:14px;color:#1a1a1a">{{ submission.name }}</td>
          </tr>
          <tr>
            <td style="padding:8px 0;border-bottom:1px solid #eee;font-size:13px;color:#666">{{ CURRENT_LANG.home.contact.form.email }}</td>
            <td style="padding:8px 0;border-bottom:1px solid #eee;font-size:14px;color:#1a1a1a"><a href="mailto:{{ submission.email }}" style="color:#4f46e5;text-decoration:none">{{ submission.email }}</a></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <td style="padding:24px 32px 32px 32px">
        <p style="margin:0 0 8px 0;font-size:13px;color:#666;text-transform:uppercase;letter-spacing:0.1em">{{ CURRENT_LANG.home.contact.form.message }}</p>
        <div style="font-size:14px;white-space:pre-wrap">{{ submission.message }}</div>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 32px 24px 32px;border-top:1px solid #eee;font-size:12px;color:#999">
        {{ CURRENT_LANG.contactMail.recipient.footer }}
      </td>
    </tr>
  </table>
</body>
</html>
