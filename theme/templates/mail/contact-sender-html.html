<!DOCTYPE html>
<html lang="{{ LANG }}">
<head>
  <meta charset="UTF-8" />
  <title>{{ CURRENT_LANG.contactMail.sender.subject }}</title>
</head>
<body style="margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;color:#1a1a1a;background:#f7f7f7">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;margin:0 auto;background:#ffffff;border:1px solid #e5e5e5;border-collapse:collapse">
    <tr>
      <td style="padding:32px">
        <p style="margin:0 0 16px 0;font-size:15px">{{ CURRENT_LANG.contactMail.sender.greeting }}</p>
        <p style="margin:0 0 16px 0;font-size:15px">{{ CURRENT_LANG.contactMail.sender.body }}</p>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 32px 24px 32px;border-top:1px solid #eee;font-size:13px;color:#666">
        {{ CURRENT_LANG.contactMail.sender.signature }}
      </td>
    </tr>
  </table>
</body>
</html>
